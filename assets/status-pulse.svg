<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Online status with heartbeat">
  <defs>
    <linearGradient id="ecgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3a0006" stop-opacity="0.4"/>
      <stop offset="50%"  stop-color="#c41e3a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3a0006" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="1.2"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <line x1="10" y1="30" x2="310" y2="30" stroke="#1a0a0d" stroke-width="0.8"/>

  <path d="M 10 30 L 60 30 L 70 30 L 75 22 L 82 38 L 88 16 L 94 44 L 100 30 L 150 30 L 160 30 L 165 24 L 172 36 L 178 18 L 184 42 L 190 30 L 250 30 L 260 30 L 265 26 L 272 34 L 278 22 L 284 38 L 290 30 L 310 30"
        fill="none" stroke="url(#ecgGrad)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"
        opacity="0.55"/>

  <path d="M 10 30 L 60 30 L 70 30 L 75 22 L 82 38 L 88 16 L 94 44 L 100 30 L 150 30 L 160 30 L 165 24 L 172 36 L 178 18 L 184 42 L 190 30 L 250 30 L 260 30 L 265 26 L 272 34 L 278 22 L 284 38 L 290 30 L 310 30"
        fill="none" stroke="#ff2a4a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#lineGlow)"
        stroke-dasharray="40 560" stroke-dashoffset="600">
    <animate attributeName="stroke-dashoffset" from="600" to="0" dur="3s" repeatCount="indefinite"/>
  </path>

  <circle cx="10" cy="30" r="2.5" fill="#c41e3a">
    <animate attributeName="r" values="2;4;2" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <text x="160" y="54" font-family="'Courier New', monospace" font-size="9" font-weight="700"
        fill="#8b0010" text-anchor="middle" letter-spacing="4">
    ◆ S Y S T E M   O N L I N E ◆
  </text>
</svg>
